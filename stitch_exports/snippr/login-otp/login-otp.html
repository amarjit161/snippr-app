<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - QueueCut AI</title>
<!-- Google Fonts: Manrope & Plus Jakarta Sans -->
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols Outlined -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#832600",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "surface-variant": "#e3e2e5",
              "background": "#faf9fc",
              "surface-bright": "#faf9fc",
              "on-tertiary-container": "#503d00",
              "surface-container-high": "#e8e8eb",
              "on-tertiary-fixed": "#241a00",
              "primary-container": "#6750a4",
              "secondary-fixed-dim": "#ffb59d",
              "error": "#ba1a1a",
              "on-secondary": "#ffffff",
              "primary-fixed-dim": "#cfbcff",
              "on-error-container": "#93000a",
              "surface-container-highest": "#e3e2e5",
              "surface": "#faf9fc",
              "primary": "#4f378a",
              "surface-dim": "#dadadc",
              "on-tertiary-fixed-variant": "#594400",
              "tertiary-fixed-dim": "#e7c365",
              "secondary-fixed": "#ffdbd0",
              "on-primary-fixed-variant": "#4f378a",
              "on-primary-container": "#e0d2ff",
              "on-primary-fixed": "#22005d",
              "tertiary": "#765b00",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#1a1c1e",
              "surface-tint": "#6750a4",
              "on-primary": "#ffffff",
              "on-secondary-container": "#5d1900",
              "primary-fixed": "#e9ddff",
              "on-background": "#1a1c1e",
              "outline": "#7a7582",
              "surface-container-low": "#f4f3f6",
              "tertiary-fixed": "#ffdf93",
              "inverse-surface": "#2f3033",
              "tertiary-container": "#c9a74d",
              "secondary-container": "#fe6a34",
              "secondary": "#ab3500",
              "outline-variant": "#cbc4d2",
              "inverse-on-surface": "#f1f0f3",
              "on-secondary-fixed": "#390c00",
              "inverse-primary": "#cfbcff",
              "surface-container": "#eeedf0",
              "on-surface-variant": "#494551",
              "on-tertiary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-pattern {
        background-color: #faf9fc;
        background-image: radial-gradient(#e0d2ff 0.8px, transparent 0.8px), radial-gradient(#e0d2ff 0.8px, #faf9fc 0.8px);
        background-size: 32px 32px;
        background-position: 0 0, 16px 16px;
        opacity: 0.4;
      }
      .floating-label-input:focus-within label,
      .floating-label-input input:not(:placeholder-shown) + label {
        transform: translateY(-1.5rem) scale(0.85);
        background-color: #ffffff;
        padding: 0 0.25rem;
        color: #4f378a;
      }
    </style>
</head>
<body class="font-body bg-background text-on-background min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Background Texture -->
<div class="absolute inset-0 bg-pattern -z-10"></div>
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px] -z-10"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px] -z-10"></div>
<!-- Main Content Canvas -->
<main class="w-full max-w-[440px] z-10">
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-12 shadow-[0px_12px_32px_rgba(79,55,138,0.06)] border border-outline-variant/10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">content_cut</span>
</div>
<h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">QueueCut AI - Log In</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Precision in every second.</p>
</div>
<!-- Login Form -->
<form class="space-y-8" onsubmit="return false;">
<!-- Phone Number Section -->
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Phone Number</label>
<div class="flex gap-3">
<!-- Country Code -->
<div class="relative w-24">
<select class="w-full h-14 bg-surface-container-low border-0 rounded-lg text-sm font-semibold text-on-surface focus:ring-2 focus:ring-primary appearance-none px-4 cursor-pointer">
<option>+1</option>
<option>+44</option>
<option>+91</option>
<option>+61</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-lg">expand_more</span>
</div>
<!-- Input with Floating Label Logic -->
<div class="relative flex-1 floating-label-input">
<input class="peer w-full h-14 bg-surface-container-low border-0 rounded-lg px-4 text-on-surface placeholder-transparent focus:ring-2 focus:ring-primary focus:bg-white transition-all" id="phone" placeholder=" " type="tel"/>
<label class="absolute left-4 top-4 text-on-surface-variant pointer-events-none transition-all duration-200 origin-left text-sm font-medium" for="phone">Enter your number</label>
</div>
</div>
</div>
<!-- OTP Section (Always visible for layout demo, or could be toggled) -->
<div class="space-y-4 pt-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant">Verification Code</label>
<button class="text-primary text-xs font-bold hover:underline" type="button">Resend Code</button>
</div>
<div class="grid grid-cols-4 gap-4">
<input class="w-full h-14 bg-surface-container-low border-0 rounded-lg text-center font-headline text-xl font-bold text-primary focus:ring-2 focus:ring-primary focus:bg-white transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 bg-surface-container-low border-0 rounded-lg text-center font-headline text-xl font-bold text-primary focus:ring-2 focus:ring-primary focus:bg-white transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 bg-surface-container-low border-0 rounded-lg text-center font-headline text-xl font-bold text-primary focus:ring-2 focus:ring-primary focus:bg-white transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 bg-surface-container-low border-0 rounded-lg text-center font-headline text-xl font-bold text-primary focus:ring-2 focus:ring-primary focus:bg-white transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-gradient-to-br from-primary to-primary-container text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Get Started
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Secondary Links -->
<div class="mt-8 flex flex-col items-center gap-4">
<p class="text-xs text-on-surface-variant text-center leading-relaxed">
                    By continuing, you agree to our <a class="text-on-surface font-semibold underline decoration-primary/30" href="#">Terms of Service</a> and <a class="text-on-surface font-semibold underline decoration-primary/30" href="#">Privacy Policy</a>.
                </p>
<div class="h-px w-12 bg-outline-variant/30"></div>
<p class="text-xs font-bold text-secondary flex items-center gap-1.5">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">verified</span>
                    Welcome back!
                </p>
</div>
</div>
<!-- App Store Badges (Optional Premium Touch) -->
<div class="mt-12 flex justify-center gap-8 opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-2xl">ios</span>
<span class="font-headline font-bold text-sm tracking-tight">App Store</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-2xl">play_arrow</span>
<span class="font-headline font-bold text-sm tracking-tight">Play Store</span>
</div>
</div>
</main>
<!-- Decorative Bottom Gradient -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary opacity-20"></div>
</body></html>
