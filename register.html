<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-signature-gradient {
            background: linear-gradient(135deg, #f3f4f5 0%, #eaddff 100%);
        }
        .btn-gradient {
            background: linear-gradient(45deg, #630ed4 0%, #7c3aed 100%);
        }
    </style>

<body class="bg-signature-gradient min-h-screen flex flex-col items-center justify-center p-6 sm:p-8">
<!-- Brand Anchor Point (Logo) -->
<div class="mb-8 text-center">
<span class="text-3xl font-black text-violet-700 tracking-[-0.04em] font-headline">Snippr</span>
<p class="text-on-surface-variant text-sm mt-1 font-medium tracking-wide">Elevated Grooming Experience</p>
</div>
<!-- Main Registration Card -->
<main class="w-full max-w-lg bg-surface-container-lowest rounded-lg shadow-[0_20px_40px_rgba(99,14,212,0.06)] p-8 md:p-10">
<!-- Progress Indicator -->
<header class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-3">
<div class="h-2 w-8 bg-primary rounded-full"></div>
<div class="h-2 w-2 bg-surface-container-high rounded-full"></div>
<div class="h-2 w-2 bg-surface-container-high rounded-full"></div>
</div>
<span class="text-xs font-bold text-primary tracking-widest uppercase font-label">Step 1 of 1</span>
<h1 class="text-2xl font-extrabold text-on-background mt-4 tracking-tight">Create your profile</h1>
<p class="text-on-surface-variant text-sm mt-1">Join the elite circle of groomed gentlemen.</p>
</header>
<!-- Registration Form -->
<form class="space-y-6">
<!-- Two-column row: First & Last Name -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">First Name</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="John" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Last Name</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="Doe" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">mail</span>
<input class="w-full bg-surface-container-high border-none rounded-sm pl-12 pr-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="john.doe@luxury.com" type="email"/>
</div>
</div>
<!-- Phone Number Field with fixed +91 -->
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Phone Number</label>
<div class="flex">
<span class="flex items-center justify-center bg-surface-container-highest text-on-surface-variant px-4 py-3.5 rounded-l-sm border-r border-outline-variant/20 font-semibold text-sm">
                        +91
                    </span>
<input class="w-full bg-surface-container-high border-none rounded-r-sm px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="98765 43210" type="tel"/>
</div>
</div>
<!-- Gender Selection Pill Buttons -->
<div class="space-y-3">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Gender Identification</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex items-center justify-center py-2.5 px-4 rounded-full border border-outline-variant/30 text-sm font-medium text-on-surface-variant hover:bg-primary/5 hover:border-primary transition-all active:scale-95" type="button">
                        Male
                    </button>
<button class="flex items-center justify-center py-2.5 px-4 rounded-full bg-primary-fixed-dim text-on-primary-fixed text-sm font-bold shadow-sm ring-1 ring-primary/20 active:scale-95 transition-all" type="button">
                        Female
                    </button>
<button class="flex items-center justify-center py-2.5 px-4 rounded-full border border-outline-variant/30 text-sm font-medium text-on-surface-variant hover:bg-primary/5 hover:border-primary transition-all active:scale-95" type="button">
                        Other
                    </button>
</div>
</div>
<!-- Password and Confirm Password -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Password</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">Confirm</label>
<input class="w-full bg-surface-container-high border-none rounded-sm px-4 py-3.5 text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<div class="pt-4">
<button class="w-full btn-gradient text-on-primary font-bold py-4 rounded-full shadow-lg hover:shadow-xl hover:opacity-95 transition-all transform active:scale-[0.98] tracking-tight" type="submit">
                    Create Account
                </button>
</div>
</form>
<!-- Footer Link -->
<footer class="mt-8 text-center">
<p class="text-on-surface-variant text-sm">
                Already part of the community? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Sign In</a>
</p>
</footer>
</main>
<!-- Aesthetic Decorative Element -->
<div class="mt-12 opacity-30 pointer-events-none">
<div class="flex items-center gap-6">
<div class="w-16 h-16 rounded-full overflow-hidden grayscale hover:grayscale-0 transition-all duration-700">

</div>
<div class="w-12 h-12 rounded-full overflow-hidden grayscale hover:grayscale-0 transition-all duration-700">
<img class="w-full h-full object-cover" data-alt="professional hair stylist scissors and comb on a clean white marble surface with purple accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUX_jXHBvfzTUGMK93s_7sowuN6Nr9lRcHY-r2Tg8RW5MErChsUKBLUpNSCZlI5DRfkSgH7MXqXIw66Rkf9JY5vL7wpA0wIHGku047CRyz5gBzmgLwAht8FNY8-s_NQWEnc94uFi1QM3Zxn7IQpBSvm0yFMAXtaZ12G22IZaFfzrGU6y07LYXOoRMTlkICHITSXOgfOFAOxu0AVTBHtd8PidTvp-7_QQXU3I1KZw-RtKc1DRrsoZ6f1TEzwIi_BjnHvonsEt8jivM"/>
</div>
<div class="w-16 h-16 rounded-full overflow-hidden grayscale hover:grayscale-0 transition-all duration-700">
<img class="w-full h-full object-cover" data-alt="close-up of a gentleman receiving a haircut in a premium salon with bokeh background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNUp9rnDGBtyBUrWR0IM0nKlf9KTzAnUqdf14izCo8vCVc7J7byE8-dlofE-M5O_2ESFKpg9mXyGdK0YNOxEIxLOtVB2einGY_BNQtQiVwPjB677eXc9UU4og8cRroLvvZQXi8SWmkfx7aisE1evNOkfJ704FwY_Hzr7e0yQyoEXbrEk7HEQzVu2uKTbOhxz6xwzW5FFtN5dme9XY9VVb7x8CajuBZGyOjyWfLQqnc61ZPM3ufWuVW7UOpG3RzcA6cEun0LRJU3WQ"/>
</div>
</div>
</div>
</body></html>
